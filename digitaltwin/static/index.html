<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin Frontend</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #36393f;
            color: #dcddde;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 240px;
            background-color: #2f3136;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #202225;
        }

        .sidebar-header {
            padding: 16px;
            font-weight: bold;
            border-bottom: 1px solid #202225;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        #channel-list {
            flex-grow: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .channel-item {
            padding: 8px;
            margin-bottom: 2px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }

        .channel-item:hover {
            background-color: #393c43;
            color: #fff;
        }

        .channel-item.active {
            background-color: #393c43;
            color: #fff;
        }

        .channel-item::before {
            content: '#';
            margin-right: 6px;
            color: #8e9297;
            font-size: 1.2em;
        }

        .channel-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 8px 4px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            color: #8e9297;
            letter-spacing: 0.02em;
        }

        .add-channel-btn {
            background: none;
            border: none;
            color: #8e9297;
            cursor: pointer;
            font-size: 1.4em;
            line-height: 1;
            padding: 0 2px;
            border-radius: 3px;
        }

        .add-channel-btn:hover {
            color: #dcddde;
        }

        #create-channel-form {
            display: none;
            padding: 4px 8px 8px;
        }

        #create-channel-form.visible {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #create-channel-input {
            background-color: #202225;
            border: 1px solid #040405;
            border-radius: 4px;
            color: #dcddde;
            padding: 6px 8px;
            font-size: 0.9em;
            font-family: inherit;
            outline: none;
        }

        #create-channel-input:focus {
            border-color: #5865f2;
        }

        #create-channel-input.input-error {
            border-color: #ed4245;
        }

        .create-channel-actions {
            display: flex;
            gap: 6px;
        }

        .create-channel-actions button {
            flex: 1;
            padding: 6px 0;
            border: none;
            border-radius: 4px;
            font-size: 0.8em;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-create {
            background-color: #5865f2;
            color: white;
        }

        .btn-create:hover {
            background-color: #4752c4;
        }

        .btn-create:disabled {
            background-color: #4752c4;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-cancel {
            background-color: transparent;
            color: #b5bac1;
        }

        .btn-cancel:hover {
            color: #dcddde;
        }

        .channel-error {
            color: #ed4245;
            font-size: 0.8em;
            padding: 0 2px;
            min-height: 0;
            overflow: hidden;
            transition: all 0.15s ease;
        }

        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #36393f;
        }

        #members {
            width: 240px;
            background-color: #2f3136;
            border-left: 1px solid #202225;
            display: flex;
            flex-direction: column;
        }

        #user-list {
            padding: 8px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 2px;
            color: #b5bac1;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #5865f2;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-avatar.bot {
            background-color: #ed4245;
        }

        .user-name {
            color: #dcddde;
            font-size: 0.95em;
        }

        .user-bot-tag {
            margin-left: 6px;
            background-color: #5865f2;
            color: white;
            font-size: 0.65em;
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        #chat-header {
            padding: 16px;
            font-weight: bold;
            border-bottom: 1px solid #202225;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
        }

        #chat-header::before {
            content: '#';
            margin-right: 6px;
            color: #8e9297;
            font-size: 1.5em;
        }

        #messages {
            flex-grow: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #5865f2;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .bot-avatar {
            background-color: #ed4245;
        }

        .message-content-wrapper {
            display: flex;
            flex-direction: column;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .author {
            font-weight: 500;
            color: #fff;
            margin-right: 8px;
        }

        .bot-tag {
            background-color: #5865f2;
            color: white;
            font-size: 0.65em;
            padding: 2px 4px;
            border-radius: 3px;
            margin-right: 8px;
            text-transform: uppercase;
        }

        .timestamp {
            font-size: 0.75em;
            color: #72767d;
        }

        .content {
            color: #dcddde;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        #input-area {
            padding: 16px;
            background-color: #36393f;
        }

        #message-form {
            display: flex;
            background-color: #40444b;
            border-radius: 8px;
            padding: 10px 16px;
        }

        #message-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #dcddde;
            font-size: 1em;
            outline: none;
            font-family: inherit;
        }

        #message-input::placeholder {
            color: #72767d;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header" id="guild-name">Loading...</div>
        <div class="channel-section-header">
            <span>Text Channels</span>
            <button class="add-channel-btn" id="add-channel-btn" title="Create Channel">+</button>
        </div>
        <div id="create-channel-form">
            <input type="text" id="create-channel-input" placeholder="new-channel" maxlength="100" autocomplete="off">
            <div class="channel-error" id="channel-error"></div>
            <div class="create-channel-actions">
                <button class="btn-cancel" id="cancel-channel-btn" type="button">Cancel</button>
                <button class="btn-create" id="confirm-channel-btn" type="button">Create</button>
            </div>
        </div>
        <div id="channel-list"></div>
    </div>
    <div id="main">
        <div id="chat-header">Select a channel</div>
        <div id="messages"></div>
        <div id="input-area">
            <form id="message-form">
                <input type="text" id="message-input" placeholder="Message..." autocomplete="off" disabled>
            </form>
        </div>
    </div>
    <div id="members">
        <div class="sidebar-header">Users</div>
        <div id="user-list"></div>
    </div>

    <script>
        let currentState = null;
        let activeChannelId = null;

        async function fetchState() {
            try {
                const response = await fetch('/_frontend/state');
                const data = await response.json();
                currentState = data;
                render();
            } catch (err) {
                console.error('Failed to fetch state:', err);
            }
        }

        function getActiveGuild() {
            if (!currentState) return null;
            return Object.values(currentState.guilds)[0] || null;
        }

        // --- Create Channel UI ---
        const addChannelBtn = document.getElementById('add-channel-btn');
        const createChannelForm = document.getElementById('create-channel-form');
        const createChannelInput = document.getElementById('create-channel-input');
        const channelError = document.getElementById('channel-error');
        const confirmChannelBtn = document.getElementById('confirm-channel-btn');
        const cancelChannelBtn = document.getElementById('cancel-channel-btn');

        function showCreateChannelForm() {
            createChannelForm.classList.add('visible');
            createChannelInput.value = '';
            channelError.textContent = '';
            createChannelInput.classList.remove('input-error');
            createChannelInput.focus();
        }

        function hideCreateChannelForm() {
            createChannelForm.classList.remove('visible');
            channelError.textContent = '';
            createChannelInput.classList.remove('input-error');
        }

        function showChannelError(msg) {
            channelError.textContent = msg;
            createChannelInput.classList.add('input-error');
        }

        function clearChannelError() {
            channelError.textContent = '';
            createChannelInput.classList.remove('input-error');
        }

        addChannelBtn.addEventListener('click', showCreateChannelForm);
        cancelChannelBtn.addEventListener('click', hideCreateChannelForm);

        createChannelInput.addEventListener('input', () => {
            clearChannelError();
            const name = createChannelInput.value.trim().toLowerCase().replace(/\s+/g, '-');
            if (!name) return;
            const channels = Object.values(currentState?.channels || {});
            const guild = getActiveGuild();
            const guildChannels = guild
                ? channels.filter(c => c.guild_id === guild.id)
                : channels;
            const duplicate = guildChannels.some(c => c.name === name);
            if (duplicate) {
                showChannelError(`Channel #${name} already exists in this server`);
            }
        });

        createChannelInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                createChannel();
            } else if (e.key === 'Escape') {
                hideCreateChannelForm();
            }
        });

        confirmChannelBtn.addEventListener('click', createChannel);

        async function createChannel() {
            const guild = getActiveGuild();
            if (!guild) return;

            const raw = createChannelInput.value.trim().toLowerCase().replace(/\s+/g, '-');
            if (!raw) {
                showChannelError('Channel name cannot be empty');
                return;
            }

            confirmChannelBtn.disabled = true;
            try {
                const res = await fetch(`/api/v10/guilds/${guild.id}/channels`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bot frontend-token',
                    },
                    body: JSON.stringify({ name: raw, type: 0 }),
                });
                const data = await res.json();
                if (!res.ok) {
                    showChannelError(data.message || 'Failed to create channel');
                    return;
                }
                hideCreateChannelForm();
                activeChannelId = data.id;
                await fetchState();
            } catch (err) {
                showChannelError('Network error — could not create channel');
            } finally {
                confirmChannelBtn.disabled = false;
            }
        }

        function render() {
            if (!currentState) return;

            // Render guild
            const guild = getActiveGuild();
            if (guild) {
                document.getElementById('guild-name').textContent = guild.name;
            }

            // Render channels
            const channelList = document.getElementById('channel-list');
            const channels = Object.values(currentState.channels);
            
            // Set first channel as active if none selected
            if (!activeChannelId && channels.length > 0) {
                activeChannelId = channels[0].id;
            }

            channelList.innerHTML = '';
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = `channel-item ${channel.id === activeChannelId ? 'active' : ''}`;
                div.textContent = channel.name;
                div.onclick = () => {
                    activeChannelId = channel.id;
                    render();
                };
                channelList.appendChild(div);
            });

            // Render users (bot first so its mention name is obvious)
            const userList = document.getElementById('user-list');
            const users = Object.values(currentState.users || {}).sort((a, b) => {
                if (a.bot && !b.bot) return -1;
                if (!a.bot && b.bot) return 1;
                return a.username.localeCompare(b.username);
            });
            userList.innerHTML = '';
            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';

                const avatar = document.createElement('div');
                avatar.className = `user-avatar ${user.bot ? 'bot' : ''}`;
                avatar.textContent = user.username.charAt(0).toUpperCase();

                const name = document.createElement('span');
                name.className = 'user-name';
                name.textContent = user.username;

                userDiv.appendChild(avatar);
                userDiv.appendChild(name);

                if (user.bot) {
                    const botTag = document.createElement('span');
                    botTag.className = 'user-bot-tag';
                    botTag.textContent = 'BOT';
                    userDiv.appendChild(botTag);
                }

                userList.appendChild(userDiv);
            });

            // Update chat header and input
            const activeChannel = currentState.channels[activeChannelId];
            if (activeChannel) {
                document.getElementById('chat-header').textContent = activeChannel.name;
                const input = document.getElementById('message-input');
                input.placeholder = `Message #${activeChannel.name}`;
                input.disabled = false;
            }

            // Render messages
            const messagesDiv = document.getElementById('messages');
            const isAtBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop <= messagesDiv.clientHeight + 50;
            
            messagesDiv.innerHTML = '';
            const messageIds = currentState.channel_messages[activeChannelId] || [];
            
            messageIds.forEach(msgId => {
                const msg = currentState.messages[msgId];
                if (!msg) return;

                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';

                const isBot = msg.author.bot;
                const avatar = document.createElement('div');
                avatar.className = `avatar ${isBot ? 'bot-avatar' : ''}`;
                avatar.textContent = msg.author.username.charAt(0).toUpperCase();

                const wrapper = document.createElement('div');
                wrapper.className = 'message-content-wrapper';

                const header = document.createElement('div');
                header.className = 'message-header';
                
                const authorSpan = document.createElement('span');
                authorSpan.className = 'author';
                authorSpan.textContent = msg.author.username;
                header.appendChild(authorSpan);

                if (isBot) {
                    const botTag = document.createElement('span');
                    botTag.className = 'bot-tag';
                    botTag.textContent = 'BOT';
                    header.appendChild(botTag);
                }

                const timeSpan = document.createElement('span');
                timeSpan.className = 'timestamp';
                try {
                    const d = new Date(msg.timestamp);
                    timeSpan.textContent = d.toLocaleString();
                } catch (e) {
                    timeSpan.textContent = msg.timestamp;
                }
                header.appendChild(timeSpan);

                const content = document.createElement('div');
                content.className = 'content';
                content.textContent = msg.content;

                wrapper.appendChild(header);
                wrapper.appendChild(content);
                
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(wrapper);
                messagesDiv.appendChild(msgDiv);
            });

            if (isAtBottom) {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!activeChannelId) return;

            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;

            input.value = '';

            try {
                await fetch('/_frontend/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channel_id: activeChannelId,
                        content: content
                    })
                });
                fetchState(); // Immediately fetch to update UI
            } catch (err) {
                console.error('Failed to send message:', err);
                input.value = content; // restore on failure
            }
        });

        // Initial fetch and start polling
        fetchState();
        setInterval(fetchState, 1000);
    </script>
</body>
</html>
